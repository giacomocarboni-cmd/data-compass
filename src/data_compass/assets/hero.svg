<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 150">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="#DDE9F5"/>
      <stop offset="100%" stop-color="#EDF3FA"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="900" height="150" fill="url(#bgGrad)"/>

  <!-- Top and bottom border rules -->
  <line x1="0" y1="3"   x2="900" y2="3"   stroke="#1B6CA8" stroke-width="2" opacity="0.28"/>
  <line x1="0" y1="147" x2="900" y2="147" stroke="#1B6CA8" stroke-width="2" opacity="0.28"/>

  <!-- ── GRID ────────────────────────────────────────────────── -->
  <!-- Major verticals (every 150 px) -->
  <line x1="150" y1="0" x2="150" y2="150" stroke="#1B6CA8" stroke-width="0.7" opacity="0.22"/>
  <line x1="300" y1="0" x2="300" y2="150" stroke="#1B6CA8" stroke-width="0.7" opacity="0.22"/>
  <line x1="450" y1="0" x2="450" y2="150" stroke="#1B6CA8" stroke-width="0.7" opacity="0.22"/>
  <line x1="600" y1="0" x2="600" y2="150" stroke="#1B6CA8" stroke-width="0.7" opacity="0.22"/>
  <line x1="750" y1="0" x2="750" y2="150" stroke="#1B6CA8" stroke-width="0.7" opacity="0.22"/>
  <!-- Major horizontals -->
  <line x1="0" y1="50"  x2="900" y2="50"  stroke="#1B6CA8" stroke-width="0.7" opacity="0.22"/>
  <line x1="0" y1="100" x2="900" y2="100" stroke="#1B6CA8" stroke-width="0.7" opacity="0.22"/>
  <!-- Minor verticals (every 50 px, skip majors) -->
  <line x1="50"  y1="0" x2="50"  y2="150" stroke="#1B6CA8" stroke-width="0.3" opacity="0.13"/>
  <line x1="100" y1="0" x2="100" y2="150" stroke="#1B6CA8" stroke-width="0.3" opacity="0.13"/>
  <line x1="200" y1="0" x2="200" y2="150" stroke="#1B6CA8" stroke-width="0.3" opacity="0.13"/>
  <line x1="250" y1="0" x2="250" y2="150" stroke="#1B6CA8" stroke-width="0.3" opacity="0.13"/>
  <line x1="350" y1="0" x2="350" y2="150" stroke="#1B6CA8" stroke-width="0.3" opacity="0.13"/>
  <line x1="400" y1="0" x2="400" y2="150" stroke="#1B6CA8" stroke-width="0.3" opacity="0.13"/>
  <line x1="500" y1="0" x2="500" y2="150" stroke="#1B6CA8" stroke-width="0.3" opacity="0.13"/>
  <line x1="550" y1="0" x2="550" y2="150" stroke="#1B6CA8" stroke-width="0.3" opacity="0.13"/>
  <line x1="650" y1="0" x2="650" y2="150" stroke="#1B6CA8" stroke-width="0.3" opacity="0.13"/>
  <line x1="700" y1="0" x2="700" y2="150" stroke="#1B6CA8" stroke-width="0.3" opacity="0.13"/>
  <line x1="800" y1="0" x2="800" y2="150" stroke="#1B6CA8" stroke-width="0.3" opacity="0.13"/>
  <line x1="850" y1="0" x2="850" y2="150" stroke="#1B6CA8" stroke-width="0.3" opacity="0.13"/>
  <!-- Minor horizontals -->
  <line x1="0" y1="25"  x2="900" y2="25"  stroke="#1B6CA8" stroke-width="0.3" opacity="0.13"/>
  <line x1="0" y1="75"  x2="900" y2="75"  stroke="#1B6CA8" stroke-width="0.3" opacity="0.13"/>
  <line x1="0" y1="125" x2="900" y2="125" stroke="#1B6CA8" stroke-width="0.3" opacity="0.13"/>

  <!-- ── DEPTH CONTOURS (isobaths) ────────────────────────── -->
  <path d="M 0,38 C 80,28 155,52 230,36 S 390,18 468,42 S 590,60 680,38 S 740,22 780,35"
        fill="none" stroke="#1B6CA8" stroke-width="1" opacity="0.13"/>
  <path d="M 0,88 C 90,72 170,105 260,84 S 430,62 510,90 S 630,118 720,94 S 760,80 790,90"
        fill="none" stroke="#1B6CA8" stroke-width="1" opacity="0.12"/>
  <path d="M 0,118 C 100,108 195,132 295,114 S 455,95 540,120 S 650,140 730,120 S 770,110 790,118"
        fill="none" stroke="#1B6CA8" stroke-width="1" opacity="0.10"/>

  <!-- ── COORDINATE LABELS ─────────────────────────────────── -->
  <text x="145" y="15" text-anchor="middle" font-family="Georgia,serif" font-size="8" fill="#1B6CA8" opacity="0.55">53°N</text>
  <text x="295" y="15" text-anchor="middle" font-family="Georgia,serif" font-size="8" fill="#1B6CA8" opacity="0.55">54°N</text>
  <text x="445" y="15" text-anchor="middle" font-family="Georgia,serif" font-size="8" fill="#1B6CA8" opacity="0.55">55°N</text>
  <text x="595" y="15" text-anchor="middle" font-family="Georgia,serif" font-size="8" fill="#1B6CA8" opacity="0.55">56°N</text>
  <text x="8"   y="53" font-family="Georgia,serif" font-size="8" fill="#1B6CA8" opacity="0.55">2°W</text>
  <text x="8"   y="103" font-family="Georgia,serif" font-size="8" fill="#1B6CA8" opacity="0.55">3°W</text>

  <!-- ── DEPTH SOUNDINGS ───────────────────────────────────── -->
  <text x="80"  y="90"  font-family="Georgia,serif" font-size="7.5" fill="#1B6CA8" opacity="0.38">24</text>
  <text x="168" y="62"  font-family="Georgia,serif" font-size="7.5" fill="#1B6CA8" opacity="0.38">18</text>
  <text x="328" y="96"  font-family="Georgia,serif" font-size="7.5" fill="#1B6CA8" opacity="0.38">31</text>
  <text x="415" y="68"  font-family="Georgia,serif" font-size="7.5" fill="#1B6CA8" opacity="0.38">15</text>
  <text x="520" y="112" font-family="Georgia,serif" font-size="7.5" fill="#1B6CA8" opacity="0.38">27</text>
  <text x="614" y="80"  font-family="Georgia,serif" font-size="7.5" fill="#1B6CA8" opacity="0.38">22</text>
  <text x="178" y="128" font-family="Georgia,serif" font-size="7.5" fill="#1B6CA8" opacity="0.38">12</text>
  <text x="482" y="42"  font-family="Georgia,serif" font-size="7.5" fill="#1B6CA8" opacity="0.38">35</text>

  <!-- ── COMPASS ROSE (centre 828, 75) ─────────────────────── -->
  <!-- Double outer rings -->
  <circle cx="828" cy="75" r="56" fill="none" stroke="#1B6CA8" stroke-width="0.9" opacity="0.3"/>
  <circle cx="828" cy="75" r="52" fill="none" stroke="#1B6CA8" stroke-width="0.4" opacity="0.18"/>

  <!-- Intercardinal lines: brass, from r=11 to r=44, with diamond tips -->
  <!-- NE -->
  <line x1="836" y1="67" x2="859" y2="44" stroke="#D4920A" stroke-width="1.3" opacity="0.65"/>
  <polygon points="859,41 862,44 859,47 856,44" fill="#D4920A" opacity="0.72"/>
  <!-- SE -->
  <line x1="836" y1="83" x2="859" y2="106" stroke="#D4920A" stroke-width="1.3" opacity="0.65"/>
  <polygon points="859,103 862,106 859,109 856,106" fill="#D4920A" opacity="0.72"/>
  <!-- SW -->
  <line x1="820" y1="83" x2="797" y2="106" stroke="#D4920A" stroke-width="1.3" opacity="0.65"/>
  <polygon points="797,103 800,106 797,109 794,106" fill="#D4920A" opacity="0.72"/>
  <!-- NW -->
  <line x1="820" y1="67" x2="797" y2="44" stroke="#D4920A" stroke-width="1.3" opacity="0.65"/>
  <polygon points="797,41 800,44 797,47 794,44" fill="#D4920A" opacity="0.72"/>

  <!-- Cardinal arrows: kite shape (tip, left-shoulder, notch, right-shoulder) -->
  <!-- N — dark midnight navy, primary bearing -->
  <polygon points="828,19 823,70 828,52 833,70" fill="#1C2B3A"/>
  <!-- S -->
  <polygon points="828,131 823,80 828,98 833,80" fill="#1B6CA8" opacity="0.82"/>
  <!-- E -->
  <polygon points="884,75 837,71 851,75 837,79" fill="#1B6CA8" opacity="0.82"/>
  <!-- W -->
  <polygon points="772,75 819,71 805,75 819,79" fill="#1B6CA8" opacity="0.82"/>

  <!-- N label (above tip) -->
  <text x="828" y="14" text-anchor="middle" font-family="Georgia,serif" font-size="10"
        font-weight="bold" fill="#1C2B3A" opacity="0.85">N</text>

  <!-- Brass centre pin -->
  <circle cx="828" cy="75" r="8"   fill="#D4920A"/>
  <circle cx="828" cy="75" r="4"   fill="#EDF3FA"/>
</svg>
